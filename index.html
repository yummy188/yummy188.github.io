<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味188的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .highlight {
            background: #f8f9fa;
            padding: 15px;
            border-left: 4px solid #3498db;
            margin: 20px 0;
            border-radius: 4px;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到美味188的个人主页</h1>
        这是一个用 GitHub Pages 搭建的极简个人主页，完全免费、无需服务器。
        
        <div class="highlight">
            <strong>我的技能：</strong> 前端开发、HTML/CSS、JavaScript、Python
            正在学习：React、Node.js、Git 高级操作
        </div>

        我热爱编程，喜欢分享知识，也期待与大家一起成长。
        
        <footer>
            &copy; 2025 美味188. 保留所有权利。
        </footer>
    </div>
</body>
</html>
